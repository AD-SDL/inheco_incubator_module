node_name: default.node
node_id: 01K9D64HNJWAJ1KAX0XG0B0FER
node_description: null
node_type: device
module_name: inheco_node
module_version: 0.0.1
capabilities:
  get_info: true
  get_state: true
  get_status: true
  send_action: true
  get_action_status: true
  get_action_result: true
  get_action_history: true
  action_files: true
  send_admin_commands: true
  set_config: true
  get_resources: false
  get_log: true
  admin_commands:
  - lock
  - reset
  - shutdown
  - unlock
node_url: null
actions:
  open:
    name: open
    description: Opens the Inheco incubator tray
    args: {}
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
  close:
    name: close
    description: Closes the Inheco incubator tray
    args: {}
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
  set_temperature:
    name: set_temperature
    description: Sets the temperature in Celsius on the Inheco incubator. If activate
      is set to False, heating element will turn off
    args:
      temperature:
        name: temperature
        description: temperature in Celsius to one decimal point. 0.0 - 80.0 are valid
          inputs, 22.0 default
        argument_type: float
        required: false
        default: 22.0
      activate:
        name: activate
        description: (optional) turn on heating/cooling element, on = True (default),
          off = False
        argument_type: bool
        required: false
        default: false
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
config:
  node_definition: default.node.yaml
  node_info_path: null
  update_node_files: true
  status_update_interval: 2.0
  state_update_interval: 5.0
  node_url: http://suestorm.cels.anl.gov:3005/
  uvicorn_kwargs: {}
  device_id: 2
  stack_floor: 0
  interface_host: localhost
  interface_port: 7000
config_schema:
  description: Configuration for the Inheco Node
  properties:
    node_definition:
      anyOf:
      - type: string
      - format: path
        type: string
      - type: 'null'
      default: default.node.yaml
      description: Path to the node definition file to use. If set, the node will
        load the definition from this file on startup. Otherwise, a default configuration
        will be created.
      title: Node Definition File
    node_info_path:
      anyOf:
      - type: string
      - format: path
        type: string
      - type: 'null'
      default: null
      description: Path to export the generated node info file. If not set, will use
        the node name and the node_definition's path.
      title: Node Info Path
    update_node_files:
      default: true
      description: Whether to update the node definition and info files on startup.
        If set to False, the node will not update the files even if they are out of
        date.
      title: Update Node Files
      type: boolean
    status_update_interval:
      anyOf:
      - type: number
      - type: 'null'
      default: 2.0
      description: The interval in seconds at which the node should update its status.
      title: Status Update Interval
    state_update_interval:
      anyOf:
      - type: number
      - type: 'null'
      default: 5.0
      title: State Update Interval
    node_url:
      default: http://127.0.0.1:2000/
      description: The URL used to communicate with the node. This is the base URL
        for the REST API.
      format: uri
      minLength: 1
      title: Node URL
      type: string
    uvicorn_kwargs:
      additionalProperties: true
      description: Configuration for the Uvicorn server that runs the REST API.
      title: Uvicorn Configuration
      type: object
    device_id:
      default: 2
      title: Device Id
      type: integer
    stack_floor:
      default: 0
      title: Stack Floor
      type: integer
    interface_host:
      default: 127.0.0.0
      title: Interface Host
      type: string
    interface_port:
      default: 7000
      title: Interface Port
      type: integer
  title: InhecoNodeConfig
  type: object
